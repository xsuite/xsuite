# This is a workflow that should run daily
name: Daily test (self-hosted, CPU no compile)

# Controls when the action will run.
on:
  schedule:
    - cron: '00 19 * * *'  # run at 19:00 UTC daily
  workflow_dispatch:

# This workflow calls the test_sh.yaml workflow passing the default
# branches as inputs. The cron workflow will not run on forks.
jobs:
  run-tests-cron-sh-cpu-no-xmask-no-compile:
    if: github.repository == 'xsuite/xsuite'
    uses: ./.github/workflows/test_sh.yaml
    with:
      test_contexts: 'ContextCpu'
      platform: 'alma-cpu-3'
      suites: '["xpart", "xtrack", "xfields", "xcoll", "xwakes"]'
      forbid_compile: true
      precompile_kernels: true
